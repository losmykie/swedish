<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Svenska D3</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --white: #FFFFFF;
    --near-white: #F9FAFB;
    --border: #E5E7EB;
    --secondary-text: #6B7280;
    --text: #111827;
    --sky: #8CE4FF;
    --sky-tint: #E8F9FF;
    --sky-dark: #6EDAF7;
    --shadow-lifted: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--white);
    color: var(--text);
    font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 16px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }

  h1 {
    font-size: 36px;
    font-weight: 700;
    letter-spacing: -0.01em;
    line-height: 1.2;
    margin-bottom: 8px;
  }

  p {
    font-size: 16px;
    color: var(--secondary-text);
    margin-bottom: 32px;
  }

  .links { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }

  a {
    display: inline-flex;
    align-items: center;
    background: var(--sky);
    color: var(--text);
    font-family: inherit;
    font-size: 15px;
    font-weight: 500;
    padding: 10px 20px;
    border-radius: 8px;
    text-decoration: none;
    transition: background 0.15s ease;
  }

  a:hover { background: var(--sky-dark); }
  a:focus-visible { outline: 2px solid var(--sky); outline-offset: 2px; }

  a.secondary {
    background: var(--white);
    border: 1px solid var(--border);
    color: var(--text);
  }
  a.secondary:hover { background: var(--near-white); }
</style>
</head>
<body>
  <h1>Hej! 👋</h1>
  <p>Swedish notes and flashcards for D3.</p>
  <div class="links">
    <a href="basic.html">Study guide →</a>
    <a href="practice.html" class="secondary">Practice</a>
  </div>
</body>
</html>
